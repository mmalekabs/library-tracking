# ─── MONOREPO — do not deploy from repository root ─────────────────
#
# Railway must use a service Root Directory:
#   Backend  → server   (uses server/railway.toml)
#   Frontend → client   (uses client/railway.toml)
#   Database → PostgreSQL plugin (no build)
#
# If Root Directory is empty, Nixpacks fails with:
#   "Nixpacks was unable to generate a build plan for this app"
# because there is no package.json at the repo root.
