# Railway frontend service — set Root Directory to "client" in service settings.
#
# Build produces client/dist/. Start must serve dist/ (not the dev index.html with /src/main.tsx).
# In Railway dashboard: remove any custom start command that runs "vite" or "npm run dev".

[build]
builder = "nixpacks"
buildCommand = "npm install && npm run build"

[deploy]
startCommand = "npm run start"
healthcheckPath = "/"
healthcheckTimeout = 100
